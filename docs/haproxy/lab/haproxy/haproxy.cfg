#---------------------------------------------------------------------
# Lab starter config == the lesson 02 config.
# Each lesson tells you what to change here; edit, validate, reload:
#   docker compose exec haproxy haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg
#   docker compose kill -s HUP haproxy        # seamless reload (lesson 08)
#---------------------------------------------------------------------

global
    log stdout format raw local0 info
    maxconn 50000
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    retries 3
    option redispatch
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout http-request 10s
    timeout http-keep-alive 2s
    timeout queue 5s

frontend fe_app
    bind :8080
    default_backend be_app

backend be_app
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server app1 app1:8080 check weight 100 maxconn 2 slowstart 30s
    server app2 app2:8080 check weight 50
