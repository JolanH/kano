#---------------------------------------------------------------------
# Lesson 12 lab — ONE config file, mounted into BOTH HAProxy nodes.
#
# The only difference between node A and node B is the container hostname
# (set in docker-compose.peers.yml). HAProxy identifies its *local* peer by
# matching the system hostname against the peer names below, so the same file
# behaves correctly on each node. (You can override with `-L <name>` or a
# `localpeer` line in `global` if the hostname can't match.)
#---------------------------------------------------------------------

global
    log stdout format raw local0 info
    maxconn 50000
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    mode http
    log global
    option httplog
    option dontlognull
    retries 3
    option redispatch
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout http-request 10s
    timeout queue 5s

#---------------------------------------------------------------------
# Replicated state lives here. Each node connects to the OTHER and pushes
# every table update over the peers protocol (TCP :10000). Tables declared
# inside the section are shared by name as `mypeers/<table>`.
#---------------------------------------------------------------------
peers mypeers
    peer haproxy-a haproxy-a:10000
    peer haproxy-b haproxy-b:10000

    # Per-IP request-rate counter (10s sliding window) — the shared rate limit.
    table requests type ip size 100k expire 60s store http_req_rate(10s)

    # Per-IP stickiness map — which backend server this client is pinned to.
    table sticky   type ip size 100k expire 30m

frontend fe_app
    bind :8080

    # Add a header so you can SEE which node answered (handy across failover).
    http-response set-header X-Served-By "%[env(NODE_NAME)]"

    # Count this request into the SHARED counter, keyed by client IP.
    http-request track-sc0 src table mypeers/requests

    # Deny once the per-IP rate exceeds 20 req / 10s. Because the counter is
    # replicated, the budget is enforced across BOTH nodes *combined* — 11 reqs
    # to A + 11 reqs to B = 22 > 20 → blocked, even though neither node alone
    # saw more than 11.
    http-request deny deny_status 429 if { sc_http_req_rate(0,mypeers/requests) gt 20 }

    default_backend be_app

backend be_app
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200

    # Pin each client IP to a server using the replicated `sticky` table.
    # If this node dies, the other already knows the pin — stickiness survives.
    stick on src table mypeers/sticky

    server app1 app1:8080 check cookie a1
    server app2 app2:8080 check cookie a2
